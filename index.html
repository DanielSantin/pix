<!DOCTYPE html>
<html lang="pt-BR" prefix="og: http://ogp.me/ns#">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento via Pix</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="💠 Pagamento via Pix Seguro">
    <meta property="og:description" content="Clique para copiar o código e finalizar seu pedido.">
    <meta property="og:url" content="https://danielsantin.github.io/pix/">
    <meta property="og:image" content="https://danielsantin.github.io/pix/preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">

    <style>
        :root {
            --pix-color: #32bcad;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e293b, var(--bg-dark));
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 28px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .pix-logo {
            width: 60px;
            height: 60px;
            background: var(--pix-color);
            margin: 0 auto 20px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            color: #000;
        }

        h2 { margin: 0; font-size: 1.6rem; letter-spacing: -0.5px; }
        p { color: #94a3b8; margin: 10px 0; font-size: 0.95rem; }

        .info-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 16px;
            margin: 25px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .valor-label { font-size: 0.8rem; text-transform: uppercase; color: var(--pix-color); font-weight: bold; }
        .valor-num { font-size: 2rem; font-weight: 800; display: block; margin-top: 5px; color: #fff; }

        .btn {
            background: var(--pix-color);
            color: #000;
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(50, 188, 173, 0.3);
            border: none;
            width: 100%;
        }

        .btn:active { transform: scale(0.96); }
        .btn.copiado { background: #22c55e; color: white; }

        .footer-secure {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="pix-logo">X</div>
    <h2>Pagamento Pix</h2>
    <p id="pedido_txt">Carregando pedido...</p>

    <div class="info-box">
        <span class="valor-label">Total a pagar</span>
        <span id="valor_txt" class="valor-num">R$ 0,00</span>
    </div>

    <button class="btn" id="btnCopiar" onclick="copiarPix()">
        📋 Copiar Código Pix
    </button>

    <div class="footer-secure">
        🔒 Pagamento Processado via Pix
    </div>
</div>

<script>
    // Captura os dados da URL (?pedido=123&valor=50.00)
    const params = new URLSearchParams(window.location.search);
    const pedido = params.get("pedido") || "Não informado";
    const valor = params.get("valor") || "0,00";

    document.getElementById("pedido_txt").innerText = "Pedido: #" + pedido;
    document.getElementById("valor_txt").innerText = "R$ " + valor;

    // Substitua pela sua chave ou código Copia e Cola real
    const pixCode = "SUA_CHAVE_PIX_OU_CODIGO_COPIA_E_COLA_AQUI";

    function copiarPix() {
        navigator.clipboard.writeText(pixCode).then(() => {
            const btn = document.getElementById("btnCopiar");
            btn.innerText = "✅ Código Copiado!";
            btn.classList.add("copiado");

            setTimeout(() => {
                btn.innerText = "📋 Copiar Código Pix";
                btn.classList.remove("copiado");
            }, 3000);
        });
    }
</script>

</body>
</html>
